# Production: https://deepresearch-1-gdhd.onrender.com  |  Vercel: https://deepresearchbeta.vercel.app
# Link in Dashboard → Blueprints, or mirror env vars on your Web Service.
# Secrets (sync: false): set values in the Render Dashboard after sync.
# SUPABASE_URL must match Vercel REACT_APP_SUPABASE_URL (same project).
# SUPABASE_SERVICE_KEY must be the service_role secret from Supabase → Settings → API (never the anon key).
# SUPABASE_JWT_SECRET (JWT signing secret, same screen) helps token validation if keys were mixed; DB/admin still need service_role.
services:
  - type: web
    name: deepresearch-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -c gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: FRONTEND_URL
        value: https://deepresearchbeta.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
# SUPABASE_ANON_KEY — same as Vercel REACT_APP_SUPABASE_ANON_KEY; lets auth.get_user work if SERVICE_KEY is wrong.
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
